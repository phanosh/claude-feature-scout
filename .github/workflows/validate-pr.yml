name: Validate Feature Database

on:
  pull_request:
    paths:
      - 'plugins/claude-feature-scout/data/features.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate features.yaml
        run: python plugins/claude-feature-scout/scripts/validate-features.py plugins/claude-feature-scout/data/features.yaml
