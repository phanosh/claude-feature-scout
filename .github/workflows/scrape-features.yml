name: Scrape Claude Code Features

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Read sources config
        id: sources
        run: |
          echo "sources<<EOF" >> $GITHUB_OUTPUT
          cat data/sources.yaml >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Scrape features via Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat <<'PROMPT'
          You are a feature scraper for the claude-feature-scout database.

          ## Task
          Search for NEW Claude Code features, tips, and tricks posted in the last 7 days.

          ## Sources to check
          Use WebSearch for each of these queries:
          1. "from:claudeai claude code" (last 7 days)
          2. "from:bcherny claude code" (last 7 days)
          3. "from:amorriscode claude" (last 7 days)
          4. "claude code new features" site:docs.anthropic.com (last 7 days)
          5. "claude code update" OR "claude code changelog" (last 7 days)

          ## Output format
          For each NEW feature/tip found, output valid YAML following this structure:

          features:
            - id: "kebab-case-id"
              title: "Feature title"
              description: |
                Description of the feature.
              category: "one of: workflow, configuration, automation, skills, integration, coding, navigation, remote, memory, performance"
              tags: [relevant, tags]
              relevance_signals:
                files: []
                frameworks: []
                indicators: []
                workflow_patterns: []
              difficulty: "beginner or intermediate or advanced"
              source:
                author: "twitter-handle or anthropic-docs"
                url: "source URL"
                date: "YYYY-MM-DD"
              example: |
                Example code or command
              added_date: "YYYY-MM-DD"
              last_verified: "YYYY-MM-DD"

          ## Rules
          - Only include genuinely NEW Claude Code features or tips
          - Do NOT include general AI tips, Claude API tips, or non-Claude-Code content
          - Each entry must have a concrete, actionable example
          - If no new features found, output: "features: []"
          - Write the output to /tmp/scraped-features.yaml

          Be thorough but precise.
          PROMPT
          )" --allowedTools "WebSearch,WebFetch,Write,Read" --output-format text

      - name: Ensure scraped file exists
        run: |
          if [ ! -f /tmp/scraped-features.yaml ]; then
            echo "features: []" > /tmp/scraped-features.yaml
          fi

      - name: Check for empty scrape
        id: check
        run: |
          FEATURE_COUNT=$(python3 -c "
          import yaml
          data = yaml.safe_load(open('/tmp/scraped-features.yaml'))
          features = data.get('features', []) if data else []
          print(len(features))
          ")
          echo "count=$FEATURE_COUNT" >> $GITHUB_OUTPUT
          echo "Scraped $FEATURE_COUNT new features"

      - name: Validate scraped data
        if: steps.check.outputs.count != '0'
        run: python scripts/validate-features.py /tmp/scraped-features.yaml

      - name: Merge and deduplicate
        if: steps.check.outputs.count != '0'
        run: python scripts/merge-scraped.py data/features.yaml /tmp/scraped-features.yaml

      - name: Update sources last_scraped
        if: steps.check.outputs.count != '0'
        run: |
          python3 -c "
          import yaml
          from datetime import date
          path = 'data/sources.yaml'
          data = yaml.safe_load(open(path))
          today = date.today().isoformat()
          for s in data.get('sources', []):
              s['last_scraped'] = today
          with open(path, 'w') as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True, sort_keys=False)
          "

      - name: Create PR if changes
        if: steps.check.outputs.count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update feature database from weekly scrape"
          title: "[auto] Feature database update (${{ steps.check.outputs.count }} new)"
          body: |
            ## Automated Feature Scrape

            Found **${{ steps.check.outputs.count }}** new features from weekly scrape.

            Sources checked:
            - @claudeai on X/Twitter
            - @bcherny on X/Twitter
            - @amorriscode on X/Twitter
            - Anthropic docs/changelog

            Please review the new entries before merging.
          branch: auto/feature-scrape
          labels: automated,feature-database
          delete-branch: true
