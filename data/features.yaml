    difficulty: "advanced"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      > I need to update the API endpoints, add tests, and update the docs.
      > Use subagents to handle each task in parallel.

      # Claude will dispatch parallel subagents for:
      # 1. API endpoint changes
      # 2. Test creation
      # 3. Documentation updates
