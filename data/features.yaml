  - id: "hooks-pre-tool-use"
    title: "PreToolUse Hook"
    description: |
      Run custom scripts before Claude uses any tool. PreToolUse hooks can validate,
      modify, or reject tool calls before they execute. Great for enforcing policies
      like preventing writes to certain directories.
    category: "automation"
    tags: [hooks, pre-tool, validation, policy, safety]
    relevance_signals:
      files: [".claude/settings.json", ".claude/settings.local.json"]
      frameworks: []
      indicators: ["has_hooks", "team_project"]
      workflow_patterns: []
    difficulty: "advanced"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      // .claude/settings.json
      {
        "hooks": {
          "PreToolUse": [
            {
              "matcher": "Edit",
              "command": "python3 .claude/hooks/check-edit-allowed.py"
            }
          ]
        }
      }
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

  - id: "hooks-post-tool-use"
    title: "PostToolUse Hook"
    description: |
      Run custom scripts after Claude uses a tool. PostToolUse hooks can log actions,
      trigger side effects, or validate results after tool execution completes.
    category: "automation"
    tags: [hooks, post-tool, logging, validation, side-effects]
    relevance_signals:
      files: [".claude/settings.json"]
      frameworks: []
      indicators: ["has_hooks", "team_project"]
      workflow_patterns: ["ci_cd_heavy"]
    difficulty: "advanced"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      // .claude/settings.json
      {
        "hooks": {
          "PostToolUse": [
            {
              "matcher": "Bash",
              "command": "python3 .claude/hooks/log-command.py"
            }
          ]
        }
      }
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

