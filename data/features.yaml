    difficulty: "intermediate"
    source:
      author: "community"
      url: "https://docs.anthropic.com/en/docs/claude-code"
      date: "2025-06-01"
    example: |
      # Only allow read operations
      claude --allowedTools Read,Grep,Glob,Bash

      # Allow everything except file writing
