  - id: "claude-md-repo-level"
    title: "CLAUDE.md at Repository Level"
    description: |
      Place a CLAUDE.md file at your repository root to give Claude persistent context
      about your project: coding conventions, architecture decisions, build commands,
      and project-specific instructions. Claude reads this automatically.
    category: "configuration"
    tags: [claude-md, configuration, project-context, conventions, memory]
    relevance_signals:
      files: ["CLAUDE.md", ".claude/CLAUDE.md"]
      frameworks: []
      indicators: ["has_claude_md", "team_project"]
      workflow_patterns: []
    difficulty: "beginner"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      # CLAUDE.md at repo root
      ## Project: MyApp
      - Language: TypeScript with strict mode
      - Framework: Next.js 14 with App Router
      - Testing: Jest + React Testing Library
      - Style: Tailwind CSS, no inline styles

      ## Commands
      - Build: `npm run build`
      - Test: `npm test`
      - Lint: `npm run lint`
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

  - id: "claude-md-folder-level"
    title: "CLAUDE.md at Folder Level"
    description: |
      Place CLAUDE.md files in subdirectories to give Claude context specific to
      that part of the codebase. Claude reads the nearest CLAUDE.md when working
      in a directory, inheriting from parent CLAUDE.md files.
    category: "configuration"
    tags: [claude-md, configuration, folder-context, modular]
    relevance_signals:
      files: ["CLAUDE.md"]
      frameworks: []
      indicators: ["large_codebase", "monorepo", "has_claude_md"]
      workflow_patterns: []
    difficulty: "intermediate"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      # src/api/CLAUDE.md
      ## API Module
      - All endpoints follow REST conventions
      - Use Zod for request validation
      - Every endpoint needs integration tests
      - Auth middleware is required on all non-public routes

      # src/frontend/CLAUDE.md
      ## Frontend Module
      - Use React Server Components where possible
      - All components need Storybook stories
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

