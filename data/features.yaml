  - id: "permission-auto-allow"
    title: "Permission Auto-Allow Patterns"
    description: |
      Configure Claude Code to automatically allow specific tools and commands
      without prompting, reducing interruptions. Set per-project or globally
      in your settings.
    category: "configuration"
    tags: [permissions, auto-allow, settings, trust, security]
    relevance_signals:
      files: [".claude/settings.json", ".claude/settings.local.json"]
      frameworks: []
      indicators: ["has_claude_md"]
      workflow_patterns: []
    difficulty: "intermediate"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      # .claude/settings.json
      {
        "permissions": {
          "allow": [
            "Bash(npm test)",
            "Bash(npm run lint)",
            "Bash(npm run build)",
            "Read",
            "Glob",
            "Grep"
          ]
        }
      }

      # Or use the slash command to manage permissions
      /permissions
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

  - id: "model-flag-switching"
    title: "Model Switching with --model Flag"
    description: |
