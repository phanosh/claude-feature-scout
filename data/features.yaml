  - id: "git-worktrees-parallel-sessions"
    title: "Git Worktrees for Parallel Claude Sessions"
    description: |
      Use git worktrees to run multiple Claude Code sessions simultaneously on different
      features without conflicts. Each worktree gets its own working directory and branch,
      letting you run independent Claude agents in parallel.
    category: "workflow"
    tags: [git, worktrees, parallel, concurrency, branching, multi-session]
    relevance_signals:
      files: [".git/config", ".gitmodules"]
      frameworks: []
      indicators: ["large_codebase", "monorepo", "many_branches"]
      workflow_patterns: ["feature_branches", "parallel_development"]
    difficulty: "advanced"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      # Create a worktree for a new feature
      git worktree add ../my-repo-feature-auth feature/auth

      # Open Claude Code in the new worktree
      cd ../my-repo-feature-auth && claude

      # Meanwhile, keep working in the main worktree
      # Each Claude session is fully isolated
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

  - id: "planning-mode"
    title: "Planning Mode (Plan → Review → Execute)"
    description: |
      Use planning mode to have Claude think through a problem before writing code.
      Claude drafts a plan, you review and refine it, then Claude executes. This
      dramatically improves outcomes for complex tasks.
    category: "workflow"
    tags: [planning, plan-mode, review, strategy, architecture]
    relevance_signals:
      files: []
      frameworks: []
      indicators: ["large_codebase", "monorepo"]
      workflow_patterns: ["feature_branches", "documentation_heavy"]
    difficulty: "beginner"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      # In Claude Code, use Shift+Tab to toggle plan mode
      # Or type:
      > Plan how to refactor the authentication module to use JWT tokens

      # Claude will output a plan. Review it, then say:
      > Execute the plan
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

  - id: "verify-work-quality"
    title: "Give Claude a Way to Verify Its Work"
    description: |
      Always give Claude a way to check its own output — run tests, lint, type-check,
      or build. This produces 2-3x quality improvement compared to blind code generation.
      Include verification commands in your CLAUDE.md or prompt.
    category: "workflow"
    tags: [verification, quality, testing, feedback-loop, best-practice]
    relevance_signals:
      files: ["package.json", "Makefile", "Cargo.toml", "pyproject.toml", "pytest.ini"]
      frameworks: []
      indicators: ["has_tests", "has_ci"]
      workflow_patterns: ["tdd", "ci_cd_heavy"]
    difficulty: "beginner"
    source:
      author: "bcherny"
      url: "https://howborisusesclaudecode.com"
      date: "2025-07-01"
    example: |
      # In CLAUDE.md, add:
      ## Verification
      After making changes, always run:
      - `npm test` to run unit tests
      - `npm run lint` to check linting
      - `npm run typecheck` to verify types

      # Or in your prompt:
      > Implement the login form and verify it works by running the test suite
    added_date: "2026-03-31"
    last_verified: "2026-03-31"

  - id: "subagent-delegation"
    title: "Subagent Delegation for Parallel Tasks"
    description: |
      Claude Code can spawn subagents to work on independent tasks in parallel.
      This is useful for large refactors, multi-file changes, or when you need
      to explore multiple approaches simultaneously.
    category: "workflow"
    tags: [subagent, parallel, delegation, concurrency, multi-task]
    relevance_signals:
      files: []
      frameworks: []
      indicators: ["large_codebase", "monorepo"]
